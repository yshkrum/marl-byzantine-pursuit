# Experiment 2: Resilience Protocol Comparison
# Owner: D (Experiment Runner)
# Ticket: EXP-04
#
# Research question: which protocol best recovers performance at f=0.33?
# Fix f=0.33, vary protocol, N=6, maze environment.

experiment:
  name: exp2_protocol_comparison
  description: "Protocol comparison at f=0.33 (1/3 Byzantine)"

env:
  grid_size: 20
  n_seekers: 6
  obs_radius: 5
  obstacle_density: 0.25
  max_steps: 500

training:
  algorithm: mappo
  n_episodes: 300
  n_seeds: 5

sweep:
  byzantine_fraction: [0.33]
  protocol: [none, broadcast, gossip, trimmed_mean, reputation]

logging:
  metrics:
    - capture_time
    - capture_rate
    - policy_entropy
    - convergence_episode
  output_dir: experiments/results/exp2/
  wandb_project: marl-byzantine-pursuit
