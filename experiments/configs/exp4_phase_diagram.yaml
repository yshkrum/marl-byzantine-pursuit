# Experiment 4: Phase Diagram — f × N Sweep
# Owner: D (Experiment Runner)
# Ticket: EXP-04
# Reviewed by: [add names before running]
#
# Research question: how does capture probability vary across the full
# (byzantine_fraction × n_seekers) space? Produces a heatmap showing
# where Byzantine corruption is tolerable vs catastrophic, and where
# team size stops helping.
#
# Sweep: f ∈ {0.0, 0.17, 0.33, 0.5} × N ∈ {2, 4, 6, 8, 10, 14}
# Protocol: broadcast (no resilience — measures raw degradation surface)

experiment:
  name: exp4_phase_diagram
  description: "Capture probability heatmap over f x N — broadcast protocol"

env:
  grid_size: 20
  obs_radius: 5
  obstacle_density: 0.25
  max_steps: 500
  # n_seekers and byzantine_fraction are swept below

training:
  algorithm: mappo
  n_episodes: 300
  n_seeds: 5

comms:
  protocol: broadcast

sweep:
  n_seekers: [2, 4, 6, 8, 10, 14]
  byzantine_fraction: [0.0, 0.17, 0.33, 0.5]

logging:
  metrics:
    - capture_rate
    - capture_time
    - policy_entropy
    - message_divergence
  output_dir: experiments/results/exp4/
  wandb_project: marl-byzantine-pursuit
